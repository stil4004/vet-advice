name: vet_advice_app
description: Ветеринарный помощник для сотрудников
version: 1.0.0+1

environment:
  sdk: ">=2.19.0 <3.0.0"

dependencies:
  flutter:
    sdk: flutter
  
  flutter_localizations:
    sdk: flutter
  
  sqflite_common_ffi: ^2.3.0+4
  sqflite_common_ffi_web: 0.4.5+4
  path_provider: ^2.1.0
  path: ^1.9.0
  http: ^1.1.0
  intl: ^0.20.2  # ИЗМЕНЕНО: с 0.19.0 на 0.20.2
  shared_preferences: ^2.2.1
  connectivity_plus: ^5.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/images/products/

dependency_overrides:  # ДОБАВЛЕНО: для гарантии
  intl: ^0.20.2

